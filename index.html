<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MÁQUINA DE REPETIR</title>
<style>
    * { box-sizing: border-box; }
    body {
        font-family: 'Comic Sans MS', cursive, sans-serif;
        background-color: #fff9c4;
        text-align: center;
        margin: 0;
        padding: 10px;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
    }

    .game-card {
        background: white;
        border: 6px solid #ffb300;
        border-radius: 30px;
        width: 100%;
        max-width: 450px;
        margin: 10px auto;
        padding: 20px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .placar {
        display: flex;
        justify-content: center;
        gap: 20px;
        font-size: 13px;
        font-weight: bold;
    }
    .placar-ac { color: #4caf50; }
    .placar-er { color: #e53935; }

    .missao-box {
        background: #fffde7;
        padding: 10px;
        border-radius: 15px;
        font-weight: bold;
        font-size: 18px;
    }

    .visualizador {
        min-height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 45px;
        gap: 5px;
        flex-wrap: wrap;
    }

    /* emoji aparecendo com pop */
    .emoji-pop {
        display: inline-block;
        opacity: 0;
        transform: scale(0);
        transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .emoji-pop.visivel {
        opacity: 1;
        transform: scale(1);
    }

    .painel-codigo {
        background: #e1f5fe;
        border: 2px solid #03a9f4;
        border-radius: 20px;
        padding: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
    }

    .contador-container {
        display: flex;
        align-items: center;
        background: white;
        border: 3px solid #03a9f4;
        border-radius: 12px;
    }

    #num-repeticoes {
        width: 60px;
        height: 50px;
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        border: none;
        color: #03a9f4;
    }

    .setas { display: flex; flex-direction: column; background: #03a9f4; border-radius: 0 9px 9px 0; overflow: hidden; }
    .seta-btn { background: #03a9f4; color: white; border: none; padding: 2px 10px; cursor: pointer; font-size: 14px; }
    .seta-btn:hover { background: #0288d1; }

    .btn-testar {
        background: #4caf50;
        color: white;
        border: none;
        padding: 15px 40px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 5px 0 #2e7d32;
        transition: 0.1s;
    }
    .btn-testar:active { transform: translateY(3px); box-shadow: none; }
    .btn-testar:disabled { background: #aaa; box-shadow: 0 5px 0 #777; cursor: not-allowed; }

    /* barra erro */
    .barra-erro {
        height: 6px;
        border-radius: 4px;
        background: #e53935;
        width: 0%;
        transition: width 1.5s linear;
        margin: 0 10px;
    }

    /* Modal */
    .modal {
        display: none;
        position: fixed;
        z-index: 100;
        left: 0; top: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(3px);
    }
    .modal-content {
        background: white;
        margin: 12vh auto;
        padding: 25px;
        border-radius: 30px;
        width: 320px;
        text-align: center;
        border: 6px solid #ffb300;
        animation: popup 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popup { from {transform:scale(0.5);opacity:0} to {transform:scale(1);opacity:1} }

    .nota-icone { font-size: 60px; margin: 10px 0; }
    .det-fim { display: flex; justify-content: center; gap: 20px; margin: 8px 0 12px; font-size: 14px; font-weight: bold; }
    .det-fim .ac { color: #4caf50; }
    .det-fim .er { color: #e53935; }

    .btn-modal {
        padding: 10px 25px;
        border-radius: 15px;
        border: none;
        background: #333;
        color: white;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        font-size: 15px;
    }

    footer {
        margin-top: auto;
        padding: 8px;
        color: #555;
        font-size: 11px;
        border-top: 1px solid #ddd;
    }
</style>
</head>
<body>

<div class="game-card">
    <h1 id="titulo-fase" style="font-size:18px;color:#f57c00;margin:0;">CARREGANDO...</h1>

    <div class="placar">
        <span class="placar-ac">✅ Acertos: <span id="pl-ac">0</span></span>
        <span class="placar-er">❌ Erros: <span id="pl-er">0</span></span>
    </div>

    <div class="missao-box" id="missao-texto">Missão: ...</div>

    <div class="visualizador" id="area-visual"></div>

    <div class="barra-erro" id="barra-erro"></div>

    <div class="painel-codigo">
        <span style="font-weight:bold;color:#01579b;">REPETIR</span>
        <div class="contador-container">
            <input type="text" id="num-repeticoes" value="1" readonly>
            <div class="setas">
                <button class="seta-btn" onclick="mudarValor(1)">▲</button>
                <button class="seta-btn" onclick="mudarValor(-1)">▼</button>
            </div>
        </div>
        <span id="emoji-comando" style="font-size:35px;">🍎</span>
    </div>

    <button class="btn-testar" id="btn-testar" onclick="testarCodigo()">TESTAR CÓDIGO ▶</button>
</div>

<!-- Modal fim de jogo -->
<div id="modalFim" class="modal">
    <div class="modal-content" id="modalBorda">
        <h2 id="modalTitulo" style="color:#4caf50;">TÍTULO</h2>
        <div id="modalIcone" class="nota-icone">😊</div>
        <p id="modalMensagem" style="font-size:15px;margin:6px 0;"></p>
        <div class="det-fim">
            <span class="ac">✅ <span id="fim-ac">0</span> acertos</span>
            <span class="er">❌ <span id="fim-er">0</span> erros</span>
        </div>
        <div style="font-size:13px;color:#777;margin-bottom:4px;">Sua nota:</div>
        <div id="fim-nota" style="font-family:'Comic Sans MS',cursive;font-size:52px;font-weight:bold;line-height:1;"></div>
        <button class="btn-modal" onclick="location.reload()">🔄 RECOMEÇAR</button>
    </div>
</div>

<footer>
    <p><strong>Disciplina: Informática – Profª Adriana Bett Terebinto</strong></p>
    <p>São Lourenço do Oeste/SC</p>
</footer>

<script>
    var fase = 0;
    var acertos = 0;
    var erros = 0;
    var rodando = false;
    var TOTAL = 10;

    var fases = [
        { nome: "Maçãs",     emoji: "🍎", qtd: 4 },
        { nome: "Foguetes",  emoji: "🚀", qtd: 3 },
        { nome: "Estrelas",  emoji: "⭐", qtd: 5 },
        { nome: "Gatinhos",  emoji: "🐱", qtd: 2 },
        { nome: "Pizzas",    emoji: "🍕", qtd: 6 },
        { nome: "Sorvetes",  emoji: "🍦", qtd: 4 },
        { nome: "Bolas",     emoji: "⚽", qtd: 7 },
        { nome: "Abelhas",   emoji: "🐝", qtd: 3 },
        { nome: "Corações",  emoji: "❤️", qtd: 5 },
        { nome: "Diamantes", emoji: "💎", qtd: 8 }
    ];

    function carregarFase() {
        rodando = false;
        var f = fases[fase];
        document.getElementById('titulo-fase').innerText = 'JOGO ' + (fase + 1) + ': MÁQUINA DE REPETIR';
        document.getElementById('missao-texto').innerText = 'MISSÃO: PEGAR ' + f.qtd + ' ' + f.nome.toUpperCase();
        document.getElementById('emoji-comando').innerText = f.emoji;
        document.getElementById('num-repeticoes').value = 1;
        document.getElementById('area-visual').innerHTML = '';
        document.getElementById('btn-testar').disabled = false;
        // limpa barra
        var bErr = document.getElementById('barra-erro');
        bErr.style.transition = 'none';
        bErr.style.width = '0%';
    }

    function mudarValor(delta) {
        if (rodando) return;
        var input = document.getElementById('num-repeticoes');
        var atual = parseInt(input.value);
        var novo = atual + delta;
        if (novo >= 1 && novo <= 10) input.value = novo;
    }

    function delay(ms) {
        return new Promise(function(r){ setTimeout(r, ms); });
    }

    async function testarCodigo() {
        if (rodando) return;
        rodando = true;

        var f = fases[fase];
        var repeticoes = parseInt(document.getElementById('num-repeticoes').value);
        var area = document.getElementById('area-visual');
        var btn = document.getElementById('btn-testar');

        area.innerHTML = '';
        btn.disabled = true;

        // animação com emojis aparecendo um a um — 500ms entre cada
        for (var i = 0; i < repeticoes; i++) {
            var span = document.createElement('span');
            span.className = 'emoji-pop';
            span.textContent = f.emoji;
            area.appendChild(span);
            // força reflow antes da transição
            span.getBoundingClientRect();
            span.classList.add('visivel');
            await delay(500);
        }

        await delay(400);

        if (repeticoes === f.qtd) {
            // ACERTOU
            acertos++;
            document.getElementById('pl-ac').textContent = acertos;
            rodando = false;
            btn.disabled = false;

            if (fase < TOTAL - 1) {
                fase++;
                // pequena pausa antes de avançar
                await delay(700);
                carregarFase();
            } else {
                mostrarFim();
            }
        } else {
            // ERROU — sem mostrar resposta certa
            erros++;
            document.getElementById('pl-er').textContent = erros;

            // barra vermelha antes de avançar
            var bErr = document.getElementById('barra-erro');
            bErr.getBoundingClientRect();
            bErr.style.transition = 'width 1.5s linear';
            bErr.style.width = '100%';

            await delay(1600);

            if (fase < TOTAL - 1) {
                fase++;
                carregarFase();
            } else {
                mostrarFim();
            }
        }
    }

    function mostrarFim() {
        var nota = parseFloat((acertos / TOTAL * 10).toFixed(1));
        var notaStr = nota.toFixed(1).replace('.', ',');
        var cor, titulo, msg;

        if (nota >= 9)      { cor = '#4caf50'; titulo = 'EXCELENTE! 🏆'; msg = 'Você é um mestre da máquina de repetir!'; }
        else if (nota >= 7) { cor = '#ffa000'; titulo = 'MUITO BOM! 😊'; msg = 'Continue praticando, você está indo bem!'; }
        else if (nota >= 5) { cor = '#ff7043'; titulo = 'BOM ESFORÇO! 💪'; msg = 'Tente de novo, você consegue melhorar!'; }
        else                { cor = '#e53935'; titulo = 'NÃO DESANIME! 😄'; msg = 'Jogar de novo ajuda a aprender!'; }

        document.getElementById('modalTitulo').innerText = titulo;
        document.getElementById('modalTitulo').style.color = cor;
        document.getElementById('modalIcone').innerText = nota >= 9 ? '🏆' : nota >= 7 ? '🌟' : nota >= 5 ? '💪' : '😄';
        document.getElementById('modalMensagem').innerText = msg;
        document.getElementById('fim-ac').textContent = acertos;
        document.getElementById('fim-er').textContent = erros;
        document.getElementById('fim-nota').textContent = notaStr;
        document.getElementById('fim-nota').style.color = cor;
        document.getElementById('modalBorda').style.borderColor = cor;
        document.getElementById('modalFim').style.display = 'block';
    }

    carregarFase();
</script>

</body>
</html>
